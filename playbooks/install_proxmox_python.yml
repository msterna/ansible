---
- name: Install Proxmox Ansible dependencies
  hosts: proxmox
  become: true

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Python dependencies
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-setuptools
          - python3-venv
        state: present

    - name: Install proxmoxer via pip
      ansible.builtin.pip:
        name: "proxmoxer>=2.3"
        executable: pip3
        extra_args: --break-system-packages